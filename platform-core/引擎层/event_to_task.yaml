# platform-core/引擎层/event_to_task.yaml
# 事件 → 任务 映射表
# 挂载点:引擎层(§15.6 未决项 1 的落地,不嵌打法包不嵌 agent defaults)
#
# P0-9.3 按 ZJB 修正的 12 agent 清单重写:
#   只保留当前已实现的 agent 映射,未实现的注释掉,写进 pending 池
#
# 语义:
#   - event_type 与事件层 publish 的 event.type 字符串匹配
#   - target_agent 必须在打法包 enabled_agents 内(invoker 二次校验)
#   - priority:0 最高 / 5 默认 / 9 最低

_meta:
  version: 0.2.0
  updated: 2026-05-13
  note: P0-9.3 数据分析 agent 上线;其它 11 个 agent 按需求逐个实现后取消注释

mappings:

  # ── 已实现 ────────────────────────
  - event_type: 日报ingest
    target_agent: 数据分析
    priority: 3
    lookback_days: 1
    note: 吴玲日报/桌面 xlsx 清洗后触发数据分析 agent,按投手或 ZJB 视角聚合

  - event_type: HVU下降
    target_agent: 数据分析
    priority: 3
    lookback_days: 7
    note: P0-9.3 阶段 HVU 下降先走数据分析;后续加归因诊断 agent 后改投向它

  # ── 待实现(P0-9.4+ 逐个写,注释保留为路标)─────
