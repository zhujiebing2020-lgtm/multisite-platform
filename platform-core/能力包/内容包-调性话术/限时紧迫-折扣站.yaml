_meta:
  id: 限时紧迫-折扣站
  version: "0.1.0"
  owner: 投手HZM
  updated: 2026-05-13

tone:
  primary: 限时紧迫
  secondary: 划算

brand_phrases:
  cta:
    - 限时直降
    - 今晚截止
    - 再不抢就没了
    - 全网最低
  urgency:
    - 仅剩最后 X 小时
    - 错过今晚涨价
    - 专属折扣码倒计时
  value:
    - 省 XX 美元
    - 同款对比官网便宜 40%
