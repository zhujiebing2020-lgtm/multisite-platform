  # 激进:放量条件放宽(L1 = 3 天连续 / 增量 20%)
  scale_up_consecutive_days: 2         # TBD-confirm
  scale_up_max_increase_pct: 30        # TBD-confirm

  # 激进:止损更快(L1 = 3 天恶化)
  stop_loss_cphq_worsening_days: 2     # TBD-confirm

  # 折扣站素材老化快(L1 = 3 天 -30%)
  creative_fatigue_ctr_drop_pct: 20    # TBD-confirm
  creative_fatigue_window_days: 2      # TBD-confirm

