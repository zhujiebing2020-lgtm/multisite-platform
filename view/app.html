<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>z-jb.com · 投放智能平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F3EE;--card:#FFFFFF;--text:#1C1814;--muted:#73685F;
  --accent:#E8603A;--accent-soft:rgba(232,96,58,.08);--accent-bd:rgba(232,96,58,.22);
  --line:rgba(0,0,0,.07);--line-2:rgba(0,0,0,.04);
  --red:#D94030;--orange:#E8603A;--yellow:#D29922;--green:#18A057;--blue:#3A9FE8;--gray:#9A8F85;
  --risk-low:#18A057;--risk-medium:#D29922;--risk-high:#D94030;
  --status-pending:#3A9FE8;--status-confirmed:#D29922;--status-executed:#18A057;--status-rejected:#9A8F85;--status-verified:#E8603A;
  --tier-s:#18A057;--tier-a:#3A9FE8;--tier-b:#D29922;--tier-o:#9A8F85;
  --drawer-bg:#FFFFFF;--drawer-shadow:0 4px 24px rgba(0,0,0,0.10);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif;font-size:14px;line-height:1.55}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 24px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:20}
header .brand{font-size:16px;font-weight:700;color:var(--accent)}
header .right{display:flex;align-items:center;gap:12px;font-size:12px}
header .user-name{color:var(--muted)}
header .logout{color:var(--red);cursor:pointer;text-decoration:none}
.views{display:flex;gap:6px;padding:10px 24px;flex-wrap:wrap;background:#fff;border-bottom:1px solid var(--line)}
.vw{padding:6px 14px;border-radius:999px;cursor:pointer;font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--line);transition:all .12s;user-select:none}
.vw:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-bd)}
.vw.a{background:var(--accent);color:#fff;font-weight:600;border-color:var(--accent)}
.filters{display:flex;gap:8px;padding:8px 24px;background:#fff;border-bottom:1px solid var(--line-2);align-items:center}
.filters label{font-size:11px;color:var(--muted)}
.filters select{font-size:12px;padding:4px 8px;border:1px solid var(--line);border-radius:4px;background:#fff}
.container{max-width:1200px;margin:0 auto;padding:16px 24px}
.sec-h{font-size:13px;font-weight:600;color:var(--muted);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;min-width:120px;flex:1}
.kpi .num{font-size:20px;font-weight:700;color:var(--text)}
.kpi .label{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:8px}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--line-2)}
th{font-size:11px;color:var(--muted);font-weight:600;background:var(--bg)}
.btn{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.btn:hover{opacity:.9}
.btn-s{padding:4px 10px;font-size:11px;border-radius:4px}
.btn-green{background:var(--green)}
.btn-gray{background:var(--gray)}
.btn-red{background:var(--red)}
.drop-zone{border:2px dashed var(--accent-bd);border-radius:8px;padding:24px;text-align:center;color:var(--muted);cursor:pointer;font-size:12px;transition:background .12s}
.drop-zone:hover,.drop-zone.hover{background:var(--accent-soft)}
.drop-zone input{display:none}
.form-group{margin-bottom:8px}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-size:12px;font-family:inherit}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .2s;z-index:100;pointer-events:none}
.toast.show{opacity:.95}
.status{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.s-done,.s-success{background:rgba(24,160,87,.1);color:var(--green)}
.s-pending,.s-running{background:rgba(58,159,232,.1);color:var(--blue)}
.s-failed{background:rgba(217,64,48,.1);color:var(--red)}
.login-page{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:40px;text-align:center;width:320px}
.login-card h1{font-size:20px;color:var(--accent);margin-bottom:6px}
.login-card p{font-size:12px;color:var(--muted);margin-bottom:20px}
.login-card input{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:6px;font-size:14px;margin-bottom:12px}
.login-card button{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.login-card .err{color:var(--red);font-size:12px;margin-top:8px;display:none}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:760px){.grid-2{grid-template-columns:1fr}}
.agent-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.result-box{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:12px;display:none}
.result-box h4{font-size:13px;margin-bottom:8px;color:var(--accent)}
.result-content{font-size:12px;line-height:1.6;white-space:pre-wrap}
.job-item{padding:8px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color .12s}
.job-item:hover,.job-item.active{border-color:var(--accent)}
.job-title{font-size:12px;font-weight:600}
.job-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tier-s{color:var(--green);font-weight:700}
.tier-a{color:var(--blue);font-weight:700}
.tier-b{color:var(--muted);font-weight:700}
.tier-r{color:var(--red);font-weight:700}
.hidden{display:none}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <h1>z-jb.com</h1>
    <p>投放智能平台</p>
    <input id="pass-input" type="password" placeholder="口令" autofocus>
    <button onclick="doLogin()">进入</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="main-app" class="hidden">
  <header>
    <span class="brand">z-jb.com</span>
    <div class="right">
      <span class="user-name" id="hd-name"></span>
      <a class="logout" onclick="fetch('/api/logout',{method:'POST'}).then(()=>location.reload())">退出</a>
    </div>
  </header>
  <div class="views" id="views"></div>
  <div class="filters" id="filters">
    <label>站点:</label>
    <select id="f-site" onchange="loadCurrentView()">
      <option value="">全部</option>
      <option value="elysianu">elysianu</option>
      <option value="crave">crave</option>
    </select>
  </div>
  <div class="container" id="content"></div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js" async></script>
<script>
let user=null;
const VIEWS={
  invest:{label:'📊 投放',roles:['admin','pitcher']},
  accept:{label:'🛠 承接诊断',roles:['admin','tech']},
  strategy:{label:'⚙️ 策略',roles:['admin','pitcher']},
  creative:{label:'🎨 素材',roles:['admin','pitcher']},
  control:{label:'🏠 总控',roles:['admin']},
  knowledge:{label:'📚 知识库',roles:['admin']},
};
let currentView='';

// === 登录 ===
document.getElementById('pass-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function doLogin(){
  const pass=document.getElementById('pass-input').value;
  fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode:pass})})
    .then(r=>r.json()).then(d=>{
      if(d.ok){user=d.user;enterApp();}
      else{const el=document.getElementById('login-err');el.textContent=d.error||'口令错误';el.style.display='block';}
    });
}
function enterApp(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('hd-name').textContent=user.display_name||user.owner_code;
  // 渲染可见视图 tabs
  const tabs=document.getElementById('views');
  tabs.innerHTML='';
  const role=user.role;
  for(const[k,v]of Object.entries(VIEWS)){
    if(!v.roles.includes(role))continue;
    const el=document.createElement('span');
    el.className='vw';el.dataset.v=k;el.textContent=v.label;
    el.onclick=()=>switchView(k);
    tabs.appendChild(el);
  }
  // 默认视图
  const defaultV=role==='admin'?'control':'invest';
  switchView(defaultV);
}
function switchView(v){
  currentView=v;
  document.querySelectorAll('.vw').forEach(el=>el.classList.toggle('a',el.dataset.v===v));
  loadCurrentView();
}
function loadCurrentView(){
  const el=document.getElementById('content');
  if(currentView==='control')renderControl(el);
  else if(currentView==='invest')renderInvest(el);
  else if(currentView==='accept')renderAccept(el);
  else if(currentView==='strategy')renderStrategy(el);
  else if(currentView==='creative')renderCreative(el);
  else if(currentView==='knowledge')renderKnowledge(el);
}
function getSite(){return document.getElementById('f-site').value;}
function toast(msg,color){const t=document.getElementById('toast');t.textContent=msg;if(color)t.style.background=color;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// === 总控视图 ===
function renderControl(el){
  el.innerHTML=`
    <div class="sec-h">全局概览</div>
    <div class="kpi-row" id="c-kpis"><div class="kpi"><div class="num">—</div><div class="label">加载中</div></div></div>
    <div class="sec-h">用户管理</div>
    <div id="c-users"></div>
    <div class="sec-h">操作日志</div>
    <div id="c-logs"></div>
  `;
  loadControlData();
}
function loadControlData(){
  const site=getSite();
  const q=site?`/api/dashboard?site=${site}`:'/api/dashboard';
  fetch(q).then(r=>r.json()).then(d=>{
    if(!d.ok){document.getElementById('c-kpis').innerHTML='<div class="kpi"><div class="num">—</div><div class="label">暂无数据</div></div>';return;}
    const s=d.summary;
    document.getElementById('c-kpis').innerHTML=`
      <div class="kpi"><div class="num">$${s.spend}</div><div class="label">总花费 · ${d.latest_date.slice(5)}</div></div>
      <div class="kpi"><div class="num">${s.hvu}</div><div class="label">总 HVU</div></div>
      <div class="kpi"><div class="num">$${s.cphq}</div><div class="label">平均 CPHQ</div></div>
      <div class="kpi"><div class="num">${s.groups}</div><div class="label">活跃组</div></div>`;
  });
  // 用户管理
  fetch('/api/admin/users').then(r=>r.json()).then(users=>{
    if(!Array.isArray(users))return;
    let h='<div class="card"><table><tr><th>代号</th><th>名称</th><th>角色</th><th>站点</th><th>操作</th></tr>';
    users.forEach(u=>{h+=`<tr><td>${u.owner_code}</td><td>${u.display_name||''}</td><td>${u.role}</td><td>${u.sites}</td><td><button class="btn btn-s" onclick="editUser('${u.owner_code}')">管理</button></td></tr>`;});
    h+='</table><button class="btn btn-green" style="margin-top:8px" onclick="showAddUser()">+ 新增用户</button></div>';
    h+='<div id="add-user-form" class="card hidden"></div><div id="edit-user-panel" class="card hidden"></div>';
    document.getElementById('c-users').innerHTML=h;
  });
  // 操作日志
  fetch('/api/admin/logs?days=7').then(r=>r.json()).then(logs=>{
    if(!Array.isArray(logs)||!logs.length){document.getElementById('c-logs').innerHTML='<p style="font-size:12px;color:var(--muted)">暂无日志</p>';return;}
    let h='<div class="card"><table><tr><th>时间</th><th>投手</th><th>动作</th><th>详情</th></tr>';
    logs.slice(0,30).forEach(l=>{
      const d=l.detail?JSON.parse(l.detail):{};
      h+=`<tr><td>${(l.ts||'').slice(5,16)}</td><td>${l.owner_code}</td><td>${l.action}</td><td style="color:var(--muted)">${Object.entries(d).map(([k,v])=>k+'='+v).join(' ')}</td></tr>`;
    });
    h+='</table></div>';
    document.getElementById('c-logs').innerHTML=h;
  });
}

// === 投放视图 ===
function renderInvest(el){
  el.innerHTML=`
    <div class="sec-h" style="cursor:pointer" onclick="document.getElementById('upload-panel').classList.toggle('hidden')">📤 上传数据 <span style="font-size:11px;color:var(--muted)">（点击展开/收起）</span></div>
    <div id="upload-panel" class="card hidden">
      <div class="drop-zone" id="i-drop">拖拽 xlsx / json 或点击选择<input type="file" accept=".xlsx,.xls,.json" id="i-file"></div>
      <div id="i-file-tag" style="margin-top:6px"></div>
      <button class="btn" style="margin-top:8px" onclick="doUpload()">上传并分析</button>
    </div>
    <div class="sec-h">广告组表现</div>
    <div class="kpi-row" id="i-kpis"></div>
    <div id="i-groups"></div>
    <div class="sec-h">触发 Agent</div>
    <div class="agent-btns">
      <button class="btn" id="tab-cmt" onclick="switchAF('cmt')">评论</button>
      <button class="btn btn-gray" id="tab-vid" onclick="switchAF('vid')">视频脚本</button>
      <button class="btn btn-gray" id="tab-str" onclick="switchAF('str')">策略</button>
    </div>
    <div id="af-cmt" class="card" style="margin-top:8px">
      <div class="form-group"><label>落地页 URL</label><input id="af-cmt-url" placeholder="https://www.creviatech.com/..."></div>
      <div class="form-group"><label>数量</label><select id="af-cmt-n"><option value="5">5条</option><option value="10" selected>10条</option><option value="20">20条</option></select></div>
      <div class="form-group"><label>剧本方向</label><select id="af-cmt-theme"><option value="女性自我探索">女性自我探索</option><option value="伴侣互动">伴侣互动</option><option value="夫妻关系修复">夫妻关系修复</option><option value="开箱体验">开箱体验</option><option value="对比旧产品">对比旧产品</option><option value="">自定义↓</option></select><input id="af-cmt-theme-custom" placeholder="自定义方向" style="margin-top:4px;display:none"></div>
      <div class="form-group"><label>补充</label><textarea id="af-cmt-note" rows="2" placeholder="可选"></textarea></div>
      <button class="btn" onclick="triggerComment()">生成评论</button>
    </div>
    <div id="af-vid" class="card hidden" style="margin-top:8px">
      <div class="form-group"><label>落地页 URL</label><input id="af-vid-url" placeholder="https://www.creviatech.com/..."></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;margin-bottom:8px">
        <button id="btn-parse-scene" type="button" class="btn btn-s" onclick="parseSceneUrl()">解析剧情</button>
        <span id="scene-parse-status" style="font-size:12px;color:var(--muted)">或手动填写下方简介</span>
      </div>
      <div id="scene-data-preview" class="hidden" style="padding:10px;background:var(--bg);border-radius:6px;font-size:12px;line-height:1.6;margin-bottom:8px"></div>
      <div class="form-group"><label>剧情标题</label><input id="af-vid-title" placeholder="如：办公室禁忌之吻"></div>
      <div class="form-group"><label>剧情简介</label><textarea id="af-vid-synopsis" rows="3" placeholder="粘贴剧情简介，Agent 会基于此生成专属脚本"></textarea></div>
      <div class="form-group"><label>标签</label><input id="af-vid-tags" placeholder="如：Reluctant play, D/s, Possessiveness"></div>
      <input type="hidden" id="af-vid-scene-data" value="">
      <div class="form-group"><label>视频时长</label><select id="af-vid-dur"><option value="15s">15秒</option><option value="30s" selected>30秒</option><option value="60s">60秒</option></select></div>
      <div class="form-group"><label>风格</label><select id="af-vid-style"><option value="写实">写实</option><option value="动画">动画</option></select></div>
      <div class="form-group"><label>补充</label><textarea id="af-vid-dir" rows="2" placeholder="可选"></textarea></div>
      <button class="btn" onclick="triggerVideoScript()">生成脚本</button>
    </div>
    <div id="af-str" class="card hidden" style="margin-top:8px">
      <div class="form-group"><label>广告组（可选）</label><input id="af-str-g" placeholder="留空=全组分析"></div>
      <div class="form-group"><label>补充</label><textarea id="af-str-note" rows="2" placeholder="可选"></textarea></div>
      <button class="btn" onclick="triggerAgent('strategy',{group:gv('af-str-g'),note:gv('af-str-note')})">生成策略</button>
    </div>
    <div class="sec-h">我的结果${user.role==='admin'?'<button class="btn btn-s btn-gray" style="margin-left:12px;font-size:10px" onclick="clearOldPending()">清除旧 pending</button>':''}</div>
    <div id="i-results"></div>
  `;
  initUpload();
  loadInvestData();
  loadResults();
}
function gv(id){return document.getElementById(id).value;}
function switchAF(id){
  ['cmt','vid','str'].forEach(k=>{
    document.getElementById('af-'+k).classList.toggle('hidden',k!==id);
    document.getElementById('tab-'+k).classList.toggle('btn-gray',k!==id);
  });
}
async function parseSceneUrl(){
  const url=gv('af-vid-url');
  const statusEl=document.getElementById('scene-parse-status');
  const previewEl=document.getElementById('scene-data-preview');
  const hiddenEl=document.getElementById('af-vid-scene-data');
  const btn=document.getElementById('btn-parse-scene');
  if(!url){statusEl.textContent='请先输入 URL';statusEl.style.color='orange';return;}
  if(!url.includes('creviatech.com')){statusEl.textContent='⚠ 非 creviatech.com，将生成通用脚本';statusEl.style.color='orange';hiddenEl.value='';previewEl.classList.add('hidden');return;}
  btn.disabled=true;btn.textContent='解析中...';statusEl.textContent='正在抓取...';statusEl.style.color='var(--muted)';
  try{
    const r=await fetch('/api/fetch-scene',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})}).then(r=>r.json());
    if(r.error||!r.title){statusEl.textContent='⚠ '+( r.error||'未找到剧情');statusEl.style.color='orange';hiddenEl.value='';previewEl.classList.add('hidden');}
    else{statusEl.textContent='✓ 剧情解析成功';statusEl.style.color='var(--green)';hiddenEl.value=JSON.stringify(r);previewEl.classList.remove('hidden');previewEl.innerHTML=`<div style="font-weight:600;margin-bottom:4px">📖 ${esc(r.title)}</div><div style="color:var(--muted);margin-bottom:6px">${(r.tags||[]).map(t=>'<span style="background:var(--bg);padding:1px 6px;border-radius:3px;margin-right:4px;border:1px solid var(--line)">#'+esc(t)+'</span>').join('')}</div><div>${esc((r.synopsis||'').slice(0,120))}${(r.synopsis||'').length>120?'...':''}</div>`;
      document.getElementById('af-vid-title').value=r.title||'';
      document.getElementById('af-vid-synopsis').value=r.synopsis||'';
      document.getElementById('af-vid-tags').value=(r.tags||[]).join(', ');
    }
  }catch(e){statusEl.textContent='⚠ 网络错误: '+e.message;statusEl.style.color='orange';hiddenEl.value='';previewEl.classList.add('hidden');}
  btn.disabled=false;btn.textContent='解析剧情';
}
function triggerVideoScript(){
  const sceneRaw=document.getElementById('af-vid-scene-data').value;
  let sceneData=sceneRaw?JSON.parse(sceneRaw):null;
  // 如果没有解析数据，用手动输入构建
  if(!sceneData){
    const title=gv('af-vid-title'),synopsis=gv('af-vid-synopsis'),tags=gv('af-vid-tags');
    if(title||synopsis)sceneData={title,synopsis,tags:tags?tags.split(/[,，]/).map(t=>t.trim()):[]};
  }
  triggerAgent('video_script',{group:gv('af-vid-url'),duration:gv('af-vid-dur'),style:gv('af-vid-style'),direction:gv('af-vid-dir'),sceneData});
}
let uploadFile=null;
function initUpload(){
  const drop=document.getElementById('i-drop'),fi=document.getElementById('i-file');
  drop.addEventListener('click',()=>fi.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('hover');});
  drop.addEventListener('dragleave',()=>drop.classList.remove('hover'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('hover');setFile(e.dataTransfer.files[0]);});
  fi.addEventListener('change',()=>setFile(fi.files[0]));
}
function setFile(f){if(!f)return;uploadFile=f;document.getElementById('i-file-tag').innerHTML=`<span style="font-size:12px;color:var(--green)">✓ ${f.name} (${(f.size/1024).toFixed(1)}KB)</span>`;}
async function doUpload(){
  if(!uploadFile){toast('请先选择文件','var(--red)');return;}
  toast('解析中...');
  // JSON → 直接上传后端解析
  if(uploadFile.name.toLowerCase().endsWith('.json')){
    const b64=btoa(String.fromCharCode(...new Uint8Array(await uploadFile.arrayBuffer())));
    const res=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:uploadFile.name,contentBase64:b64,owner:user.owner_code,site:getSite()||'elysianu',channel:'FB'})}).then(r=>r.json());
    if(res.ok)toast('✓ '+res.message);else toast(res.error||'失败','var(--red)');
    loadInvestData();return;
  }
  // XLSX → 前端解析
  const data=await uploadFile.arrayBuffer();
  const wb=XLSX.read(data,{type:'array'});
  let sn=wb.SheetNames.find(n=>/facebook|fb/i.test(n));
  if(!sn){for(const s of wb.SheetNames){const r=XLSX.utils.sheet_to_json(wb.Sheets[s],{header:1,defval:'',raw:false,range:0});if(r&&r[0]&&/组/.test(String(r[0][0]||''))){sn=s;break;}}}
  if(!sn)sn=wb.SheetNames[0];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:false});
  if(!rows||rows.length<2){toast('无法解析','var(--red)');return;}
  const header=rows[0].map(h=>String(h||'').trim());
  const records=[];
  const headerLower=header.map(h=>h.toLowerCase());
  // 原始 FB 格式
  const adsetIdx=headerLower.findIndex(h=>h.includes('广告组名称')||h.includes('ad set name')||h.includes('ชื่อชุดโฆษณา'));
  const spendIdx=headerLower.findIndex(h=>h.includes('已花费金额')||h.includes('amount spent')||h.includes('จำนวนเงินที่ใช้จ่ายไป'));
  if(adsetIdx!==-1&&spendIdx!==-1){
    const agg={};
    const dm=uploadFile.name.match(/(\d{1,2})[._](\d{1,2})/);
    const fileDate=dm?`2026-${dm[1].padStart(2,'0')}-${dm[2].padStart(2,'0')}`:new Date().toISOString().slice(0,10);
    for(let i=1;i<rows.length;i++){const m=String(rows[i][adsetIdx]||'').match(/广告组(\d+)/);if(!m)continue;const k=`组${m[1]}`;agg[k]=(agg[k]||0)+(parseFloat(String(rows[i][spendIdx]||'0').replace(/[^0-9.]/g,''))||0);}
    for(const[gn,spend]of Object.entries(agg)){if(spend>0)records.push({owner:user.owner_code,date:fileDate,group_name:gn,spend:Math.round(spend*100)/100,hvu:0,cphq:0});}
  } else if(/广告组|组|group/i.test(header[0]||'')){
    // 横向看板格式
    const dateCols=[];
    for(let c=3;c<header.length;c++){const m=String(header[c]).match(/^(\d{1,2})[\/\-.](\d{1,2})$/);if(m)dateCols.push({col:c,date:`2026-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`});}
    for(let i=1;i<rows.length;i++){const gn=String(rows[i][0]||'').trim();const ow=String(rows[i][1]||'').trim()||user.owner_code;if(!gn||/合计|图例/.test(gn))continue;
      for(const{col,date}of dateCols){const cell=String(rows[i][col]||'').trim();if(!cell||cell==='—')continue;const parts=cell.split('/');if(parts.length>=2){const spend=parseFloat(parts[0].replace(/[^0-9.]/g,''))||0;const hvu=parseInt(parts[1])||0;const cphq=parts.length>=3?parseFloat(parts[2].replace(/[^0-9.]/g,''))||0:(hvu>0?spend/hvu:0);if(spend>0||hvu>0)records.push({owner:ow,date,group_name:gn,spend,hvu,cphq:Math.round(cphq*100)/100});}}}
  }
  if(!records.length){toast('未解析到数据','var(--red)');return;}
  const site=getSite()||'elysianu';
  const res=await fetch('/api/ingest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({site,records})}).then(r=>r.json());
  if(res.ok){toast(`✓ ${res.ingested} 条数据已入库`);loadInvestData();}else toast(res.error||'失败','var(--red)');
}

}

function startPoll(jobId){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(()=>{
    fetch('/api/results/'+jobId).then(r=>r.json()).then(d=>{
      if(!d.ok)return;
      if(d.job.status==='done'||d.job.status==='failed'){
        clearInterval(pollTimer);pollTimer=null;
        loadResults();
        if(d.job.status==='done')toast('✓ Agent 完成');
        else toast('Agent 失败: '+(d.job.output_summary||''),'var(--red)');
        toggleResult(jobId);
      }
    });
  },3000);
}
function loadResults(){
  fetch('/api/results').then(r=>r.json()).then(d=>{
    const el=document.getElementById('i-results');if(!el)return;
    if(!d.ok||!d.jobs||!d.jobs.length){el.innerHTML='<p style="font-size:12px;color:var(--muted)">暂无结果</p>';return;}
    el.innerHTML=d.jobs.slice(0,15).map(j=>{
      const sc={'done':'var(--green)','pending':'var(--gray)','failed':'var(--red)'}[j.status]||'var(--muted)';

const AGENT_NAMES={data_analysis:'📊 数据分析',comment_gen:'💬 评论生成',video_script:'🎬 视频脚本',strategy:'⚙️ 自动策略',creative_agent:'🎨 素材生成'};
function toggleResult(id){
  const detail=document.getElementById('job-detail-'+id);
  if(!detail.classList.contains('hidden')){detail.classList.add('hidden');return;}
  detail.innerHTML='<span style="font-size:11px;color:var(--blue)">加载中...</span>';
  detail.classList.remove('hidden');
  fetch('/api/results/'+id).then(r=>r.json()).then(d=>{
    if(!d.ok)return;const j=d.job;
    if(j.status==='pending'){detail.innerHTML='<span style="font-size:12px;color:var(--muted)">⏳ 执行中...</span>';return;}
    if(j.status==='failed'){detail.innerHTML=`<span style="font-size:12px;color:var(--red)">❌ ${esc(j.output_summary||'失败')}</span>`;return;}
    detail.innerHTML=renderAgentOutput(j.agent_type,j.output_full||j.output_summary||'');
  });
}
function clearOldPending(){

function parseAgentResult(raw){
  if(!raw)return raw;
  let s=String(raw).replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
  try{return JSON.parse(s);}catch(e){return raw;}
}

    }).join('');

    if(data.warning)h+=`<div style="font-size:11px;color:orange;padding:6px 10px;background:rgba(255,165,0,0.08);border-radius:4px;margin-bottom:10px">⚠ ${esc(data.warning)}</div>`;
    if(data.hook)h+=`<div style="padding:10px;background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;margin-bottom:12px;font-size:13px"><span style="font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.4px">HOOK</span><div style="margin-top:4px">${esc(data.hook)}</div></div>`;
    // 参考图上传区
    h+=`<div style="border:2px dashed var(--accent-bd);border-radius:10px;padding:16px;text-align:center;margin-bottom:16px" id="ref-img-zone">

      <p style="font-size:11px;color:var(--muted);margin-top:4px">只需上传一张，所有 Scene 图从这里衍生，保证人物一致性</p>

    h+=`<div id="video-progress" style="display:none;margin-bottom:12px;padding:10px;background:var(--bg);border-radius:6px;font-size:11px">

        <div style="font-size:12px;margin-bottom:6px"><span style="color:var(--muted)">📹 画面：</span>${esc(s.visual||'')}</div>

  return `<pre style="font-size:11px;white-space:pre-wrap">${esc(String(data))}</pre>`;
}

// === 视频场景：参考图上传 + 批量生成分镜 + Kling 生成 ===
const sceneData={};
let refImageUrl=null;
let currentScenes=null;

async function uploadRefImg(input){
  const file=input.files[0];if(!file)return;
  const preview=document.getElementById('ref-img-preview');
  preview.innerHTML='<p style="font-size:11px;color:var(--blue)">上传中...</p>';
  try{
    const r=await fetch('/api/upload/image-direct',{method:'PUT',headers:{'Content-Type':file.type,'x-filename':file.name},body:file}).then(r=>r.json());
    if(r.ok){
      refImageUrl=r.url;
      preview.innerHTML=`<img src="${r.url}" style="max-height:120px;border-radius:8px;margin-bottom:8px"><br><span style="font-size:11px;color:var(--green)">✓ 参考图已上传（原图）</span>`;
      document.getElementById('gen-all-scenes-btn').disabled=false;
      document.getElementById('vp-s1').textContent='✅';
      document.getElementById('video-progress').style.display='block';
    }else{preview.innerHTML=`<span style="color:var(--red)">上传失败: ${r.error||''}</span>`;}
  }catch(e){preview.innerHTML=`<span style="color:var(--red)">上传失败: ${e.message}</span>`;}
}

async function genAllScenes(){
  if(!refImageUrl){toast('请先上传参考图','var(--red)');return;}
  const btn=document.getElementById('gen-all-scenes-btn');
  btn.disabled=true;btn.textContent='生成中...';
  document.getElementById('vp-s2').textContent='⏳ 生成中...';
  // 收集所有 scene 的 visual 描述
  const cards=document.querySelectorAll('[id^="scene-card-"]');
  const scenes=[];
  cards.forEach((card,i)=>{
    const texts=card.querySelectorAll('[style*="font-size:12px"]');
    const visual=(texts[0]?.textContent||'').replace('📹 画面：','').trim();
    scenes.push({index:i,visual});
  });
  currentScenes=scenes;
  const r=await fetch('/api/image/generate-scenes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reference_image_url:refImageUrl,scenes,style:'realistic'})}).then(r=>r.json());
  if(r.ok){
    document.getElementById('gen-scenes-status').textContent='✓ 已提交';
    pollSceneImages(r.task_id||r.results);
  }else{
    btn.disabled=false;btn.textContent='✨ 一键生成所有分镜图';
    toast(r.error||'生成失败','var(--red)');
  }
}

function pollSceneImages(taskIdOrResults){
  // 如果直接返回结果（同步）
  if(Array.isArray(taskIdOrResults)){
    applySceneImages(taskIdOrResults);return;
  }
  // 异步轮询
  const iv=setInterval(async()=>{
    const r=await fetch('/api/image/generate-scenes/status/'+taskIdOrResults).then(r=>r.json());
    if(!r.ok)return;
    if(r.status==='completed'){
      clearInterval(iv);
      applySceneImages(r.results);
    }else if(r.status==='failed'){
      clearInterval(iv);
      document.getElementById('gen-scenes-status').textContent='❌ 失败';
      document.getElementById('gen-all-scenes-btn').disabled=false;
      document.getElementById('gen-all-scenes-btn').textContent='✨ 重试';
    }
  },5000);
}

function applySceneImages(results){
  document.getElementById('vp-s2').textContent='✅';
  document.getElementById('vp-s3').textContent='⏳ 可生成';
  results.forEach(r=>{
    const i=r.index;
    sceneData[i]={...(sceneData[i]||{}),image_url:r.image_url};
    document.getElementById('scene-img-'+i).innerHTML=`<img src="${r.image_url}" style="height:60px;border-radius:6px">`;
    document.getElementById('scene-regen-'+i).style.display='inline-block';
    document.getElementById('scene-gen-'+i).style.display='inline-block';
  });
  document.getElementById('gen-all-scenes-btn').textContent='✓ 分镜图已生成';
}

async function regenSceneImg(idx){
  if(!refImageUrl){toast('请先上传参考图','var(--red)');return;}
  const card=document.getElementById('scene-card-'+idx);
  const texts=card.querySelectorAll('[style*="font-size:12px"]');
  const visual=(texts[0]?.textContent||'').replace('📹 画面：','').trim();
  document.getElementById('scene-img-'+idx).innerHTML='<span style="color:var(--blue)">重新生成中...</span>';
  const r=await fetch('/api/image/generate-scenes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reference_image_url:refImageUrl,scenes:[{index:idx,visual}],style:'realistic'})}).then(r=>r.json());
  if(r.ok&&Array.isArray(r.results)){applySceneImages(r.results);}
  else if(r.ok&&r.task_id){pollSceneImages(r.task_id);}
  else{document.getElementById('scene-img-'+idx).innerHTML='<span style="color:var(--red)">失败</span>';}
}

async function generateClip(idx){
  const sd=sceneData[idx];
  if(!sd||!sd.image_url){toast('请先生成分镜图','var(--red)');return;}
  const btn=document.getElementById('scene-gen-'+idx);
  const status=document.getElementById('scene-status-'+idx);
  btn.disabled=true;btn.textContent='生成中...';status.textContent='⏳';
  const card=document.getElementById('scene-card-'+idx);
  const texts=card.querySelectorAll('[style*="font-size:12px"]');
  const prompt=(texts[0]?.textContent||'')+(texts[1]?.textContent||'');
  const r=await fetch('/api/kling/generate-clip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:sd.image_url,prompt,duration:5,aspect_ratio:'9:16'})}).then(r=>r.json());
  if(!r.ok){status.textContent='❌ '+r.error;btn.disabled=false;btn.textContent='▶ 重试';return;}
  pollKling(idx,r.task_id);
}
function pollKling(idx,taskId){
  const status=document.getElementById('scene-status-'+idx);
  const iv=setInterval(async()=>{
    const r=await fetch('/api/kling/status/'+taskId).then(r=>r.json());
    if(!r.ok){status.textContent='❌ '+r.error;clearInterval(iv);return;}
    if(r.status==='succeed'||r.status==='completed'){
      clearInterval(iv);
      status.textContent='✓ 完成';
      sceneData[idx].video_url=r.video_url;
      document.getElementById('scene-preview-'+idx).innerHTML=`<video src="${r.video_url}" controls style="width:100%;max-width:300px;border-radius:8px;margin-top:4px"></video>`;
      document.getElementById('scene-gen-'+idx).textContent='✓ 已生成';
    }else if(r.status==='failed'){
      clearInterval(iv);status.textContent='❌ 生成失败';
      document.getElementById('scene-gen-'+idx).disabled=false;
      document.getElementById('scene-gen-'+idx).textContent='▶ 重试';
    }
  },5000);
}

function showAddProp(){
  const f=document.getElementById('add-prop-form');f.classList.remove('hidden');
  f.innerHTML=`<div class="card"><div class="form-group"><label>标题</label><input id="np-title" placeholder="命题标题"></div><div class="form-group"><label>类型</label><select id="np-type"><option value="strategy">策略</option><option value="diagnosis">诊断</option><option value="flywheel">飞轮断点</option></select></div><div class="form-group"><label>置信度</label><select id="np-status"><option value="hypothesis">存疑</option><option value="validating">验证中</option><option value="confirmed">已确认</option></select></div><button class="btn" onclick="addProp()">添加</button></div>`;

function addProp(){
  const content=JSON.stringify({title:gv('np-title')});
  fetch('/api/knowledge/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:gv('np-type'),content,status:gv('np-status')})}).then(r=>r.json()).then(d=>{
    if(d.ok){toast('✓ 已添加');loadProps('');}else toast(d.error||'失败','var(--red)');
  });
}
function loadProps(type){
  const q=type?'/api/knowledge?type='+type:'/api/knowledge';
  fetch(q).then(r=>r.json()).then(d=>{
    const el=document.getElementById('s-props');
    if(!d.ok||!d.items.length){el.innerHTML='<p style="font-size:12px;color:var(--muted)">暂无命题</p>';return;}
    const statusColor={'confirmed':'var(--green)','validating':'var(--blue)','hypothesis':'var(--muted)','falsified':'var(--red)'};
    const labels={'confirmed':'已确认','validating':'验证中','hypothesis':'存疑','falsified':'已证伪'};
    const typeLabels={'strategy':'策略','diagnosis':'诊断','flywheel':'飞轮'};
    el.innerHTML=d.items.map(e=>{
      const c=JSON.parse(e.content||'{}');
      const sc=statusColor[e.status]||'var(--muted)';
      return `<div class="card" style="border-left:3px solid ${sc};padding:10px 14px;cursor:pointer" onclick="this.querySelector('.prop-detail').classList.toggle('hidden')"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:13px">${esc(c.title||'')}</b><div><span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--muted);margin-right:4px">${typeLabels[e.type]||e.type}</span><span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${sc}20;color:${sc};font-weight:600">${labels[e.status]||e.status}</span></div></div><div class="prop-detail hidden" style="margin-top:8px;font-size:11px;color:var(--muted)">${c.proposed_date?'提出: '+c.proposed_date+' · ':''}${c.confidence||''}${c.claim_side?' · 侧: '+c.claim_side:''}</div></div>`;
    }).join('');
  });
}

// === 素材视图 ===
function renderCreative(el){
  el.innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="btn" id="cr-tab-btn-scripts" onclick="showCrTab('scripts')">脚本库</button>
      <button class="btn btn-gray" id="cr-tab-btn-images" onclick="showCrTab('images')">图片库</button>
      <button class="btn btn-gray" id="cr-tab-btn-videos" onclick="showCrTab('videos')">视频库</button>
    </div>
    <div id="cr-tab-scripts">
      <div id="cr-scripts-list"></div>
      <div class="card" style="margin-top:12px">
        <h3>导入剧本</h3>
        <div class="drop-zone" id="script-drop" style="margin-top:8px">拖拽 JSON 文件或点击选择<input type="file" accept=".json,.csv" id="script-file" style="display:none"></div>
        <div id="script-file-tag" style="margin-top:6px"></div>
        <button class="btn" style="margin-top:8px" onclick="uploadScripts()">导入</button>
      </div>

function showCrTab(tab){
  ['scripts','images','videos'].forEach(k=>{
    document.getElementById('cr-tab-'+k).classList.toggle('hidden',k!==tab);
    document.getElementById('cr-tab-btn-'+k).classList.toggle('btn-gray',k!==tab);
  });
  if(tab==='images')loadImagesList();
  if(tab==='videos')loadVideosList();
}
function loadScriptsList(){
  fetch('/api/results').then(r=>r.json()).then(d=>{
    if(!d.ok)return;
    const scripts=d.jobs.filter(j=>j.agent_type==='video_script'&&j.status==='done');
    const el=document.getElementById('cr-scripts-list');
    if(!scripts.length){el.innerHTML='<p style="font-size:12px;color:var(--muted)">暂无脚本 · 在投放视图触发"视频脚本"Agent 生成</p>';return;}
    el.innerHTML=scripts.map(j=>{
      return `<div class="card" style="padding:12px;cursor:pointer" onclick="toggleResult('${j.id}')"><div style="display:flex;justify-content:space-between"><b style="font-size:13px">${j.output_summary||'视频脚本'}</b><span style="font-size:11px;color:var(--muted)">${(j.created_at||'').slice(5,16).replace('T',' ')}</span></div><div id="job-detail-${j.id}" class="hidden" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)"></div></div>`;
    }).join('');
  });
  // 也加载剧本库
  fetch('/api/scripts').then(r=>r.json()).then(d=>{
    if(!d.ok||!d.items.length)return;
    const el=document.getElementById('cr-scripts-list');
    el.innerHTML+=`<div class="sec-h" style="margin-top:16px">剧本模板</div>`+d.items.map(s=>`<div class="card" style="padding:10px"><b>${esc(s.title)}</b><div style="font-size:11px;color:var(--muted);margin-top:4px">${esc(s.tags||'')} · ${esc(s.product||'')} · ${esc(s.emotion||'')}</div></div>`).join('');
  });
}
function loadImagesList(){
  // 从 recommendations 里找有图片的
  fetch('/api/recommendations?agent=creative_agent').then(r=>r.json()).then(d=>{
    const el=document.getElementById('cr-images-list');
    if(!d.ok||!d.items.length){el.innerHTML='<p style="font-size:12px;color:var(--muted)">暂无图片 · 在脚本库中生成分镜图</p>';return;}
    el.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">'+d.items.map(r=>{
      const c=JSON.parse(r.recommendation||'{}');
      const url=c.image_url||'';
      return url?`<div class="card" style="padding:6px"><img src="${url}" style="width:100%;border-radius:6px"><div style="font-size:10px;color:var(--muted);margin-top:4px">${(r.created_at||'').slice(5,16)}</div></div>`:'';
    }).filter(Boolean).join('')+'</div>';
  });
}
async function uploadImages(input){
  for(const file of input.files){
    const b64=btoa(String.fromCharCode(...new Uint8Array(await file.arrayBuffer())));
    await fetch('/api/upload/image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:file.name,contentBase64:b64})});
  }
  toast('✓ 上传完成');loadImagesList();
}
function loadVideosList(){
  fetch('/api/results').then(r=>r.json()).then(d=>{
    if(!d.ok)return;
    const el=document.getElementById('cr-videos-list');
    // 暂时显示提示
    el.innerHTML='<p style="font-size:12px;color:var(--muted)">视频片段在脚本库中生成后会出现在这里</p>';
  });
}
function initScriptDrop(){
  const drop=document.getElementById('script-drop'),fi=document.getElementById('script-file');
  if(!drop||!fi)return;
  drop.addEventListener('click',()=>fi.click());
  fi.addEventListener('change',()=>{if(fi.files[0])document.getElementById('script-file-tag').innerHTML=`<span style="font-size:12px;color:var(--green)">✓ ${fi.files[0].name}</span>`;});
}
async function uploadScripts(){
  const fi=document.getElementById('script-file');
  if(!fi.files[0]){toast('请选择文件','var(--red)');return;}
  const text=await fi.files[0].text();
  let items;
  try{items=JSON.parse(text);if(!Array.isArray(items))items=[items];}catch(e){toast('JSON 格式错误','var(--red)');return;}
  const r=await fetch('/api/scripts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})}).then(r=>r.json());
  if(r.ok){toast(`✓ 导入 ${r.count} 条剧本`);loadScriptsList();}else toast(r.error||'失败','var(--red)');
}

function showAddUser(){
  const p=document.getElementById('add-user-form');p.classList.remove('hidden');
  p.innerHTML=`<div class="form-group"><label>代号</label><input id="nu-code" placeholder="HNN"></div>

function addUser(){
  const code=gv('nu-code'),name=gv('nu-name'),role=gv('nu-role');
  const sites=[...document.getElementById('nu-sites').selectedOptions].map(o=>o.value);
  if(!code){toast('填代号','var(--red)');return;}
  fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner_code:code,display_name:name,role,sites})}).then(r=>r.json()).then(d=>{
    if(d.ok){toast('创建成功，口令: '+d.passcode);loadControlData();}else toast(d.error,'var(--red)');
  });
}
function editUser(code){
  fetch('/api/admin/users').then(r=>r.json()).then(users=>{
    const u=users.find(x=>x.owner_code===code);if(!u)return;
    const sites=JSON.parse(u.sites||'[]');
    const p=document.getElementById('edit-user-panel');p.classList.remove('hidden');
    p.innerHTML=`<h4 style="margin-bottom:8px">${u.owner_code} · ${u.display_name||''}</h4>
      <div style="font-size:12px;margin-bottom:8px">口令: <b>${u.passcode}</b></div>
      <div class="form-group"><label>角色</label><select id="eu-role"><option value="pitcher"${u.role==='pitcher'?' selected':''}>pitcher</option><option value="admin"${u.role==='admin'?' selected':''}>admin</option><option value="tech"${u.role==='tech'?' selected':''}>tech</option></select></div>
      <div class="form-group"><label>站点</label><select id="eu-sites" multiple><option value="crave"${sites.includes('crave')?' selected':''}>crave</option><option value="elysianu"${sites.includes('elysianu')?' selected':''}>elysianu</option></select></div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-green btn-s" onclick="saveUser('${code}')">保存</button>
        <button class="btn btn-s" onclick="resetPw('${code}')">重置口令</button>
        <button class="btn btn-red btn-s" onclick="delUser('${code}')">删除</button>
        <button class="btn btn-gray btn-s" onclick="document.getElementById('edit-user-panel').classList.add('hidden')">关闭</button>
      </div>`;
  });
}
function saveUser(code){
  const role=gv('eu-role'),sites=[...document.getElementById('eu-sites').selectedOptions].map(o=>o.value);
  fetch('/api/admin/users/'+code,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({role,sites})}).then(r=>r.json()).then(d=>{
    if(d.ok){toast('已保存');loadControlData();}else toast(d.error,'var(--red)');
  });
}
function resetPw(code){
  if(!confirm('确认重置 '+code+' 的口令？'))return;
  fetch('/api/admin/users/'+code,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({reset_passcode:true})}).then(r=>r.json()).then(d=>{
    if(d.ok)toast('新口令: '+d.passcode);else toast(d.error,'var(--red)');
    loadControlData();
  });
}
function delUser(code){
  if(!confirm('确认删除 '+code+'？'))return;
  fetch('/api/admin/users/'+code,{method:'DELETE'}).then(r=>r.json()).then(d=>{
    if(d.ok){toast('已删除');loadControlData();}else toast(d.error,'var(--red)');
  });
}
