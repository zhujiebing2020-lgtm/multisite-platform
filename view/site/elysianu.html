<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>elysianu · 子站运营看板</title>
<style>
:root{--bg:#F6F3EE;--card:#FFFFFF;--text:#1C1814;--muted:#73685F;--accent:#E8603A;--accent-soft:rgba(232,96,58,.08);--accent-bd:rgba(232,96,58,.22);--line:rgba(0,0,0,.07);--green:#18A057;--blue:#3A9FE8;--gray:#9A8F85;--red:#D94030;--yellow:#D29922}
*{box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg);margin:0}
header{background:#fff;border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
header .brand{font-size:16px;font-weight:700;color:var(--accent)}
header .brand span{font-size:12px;color:var(--muted);font-weight:400;margin-left:8px}
header .nav a{font-size:12px;color:var(--accent);text-decoration:none;margin-left:14px}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
h2{font-size:15px;color:var(--text);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center}
.kpi .num{font-size:26px;font-weight:700;color:var(--accent)}
.kpi .label{font-size:11px;color:var(--muted);margin-top:4px}
.kpi .sub{font-size:10px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:600;font-size:11px}
.tier-s{color:var(--green);font-weight:700}
.tier-a{color:var(--blue);font-weight:600}
.tier-b{color:var(--muted)}
.tier-r{color:var(--red)}
.health{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.h-green{background:var(--green)}
.h-yellow{background:var(--yellow)}
.h-red{background:var(--red)}
.h-gray{background:var(--gray)}
.trend-row{display:flex;gap:4px;align-items:flex-end;height:60px;margin:8px 0}
.trend-bar{background:var(--accent);border-radius:3px 3px 0 0;min-width:20px;flex:1;position:relative}
.trend-bar .tip{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.login-box{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:24px;margin:40px auto;max-width:300px;text-align:center}
.login-box input{width:100%;padding:10px;border:1px solid var(--line);border-radius:6px;font-size:14px;margin-bottom:10px}
.login-box button{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="brand">elysianu <span>子站运营看板</span></div>
  <div class="nav">
    <a href="/">← 总控台</a>
    <a href="/agents.html">Agent 工坊</a>
  </div>
</header>

<div class="container">
  <div id="login-box" class="login-box">
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">输入口令查看数据</p>
    <input id="pass" type="password" placeholder="口令" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">进入</button>
  </div>

  <div id="main" style="display:none">
    <!-- KPI -->
    <div class="kpi-grid" id="kpis"></div>

    <!-- 花费趋势 -->
    <h2>📈 花费趋势</h2>
    <div class="card" id="trend-card"></div>

    <!-- 各组表现 -->
    <h2>📋 广告组表现</h2>
    <div class="card" id="groups-card"></div>

    <!-- 健康度 -->
    <h2>🏥 站点健康</h2>
    <div class="card" id="health-card">
      <p style="font-size:12px;color:var(--muted)">承接侧数据由吴玲日报同步，暂未接入</p>
    </div>
  </div>
</div>

<script>
function login(){
  const pass=document.getElementById('pass').value;
  fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode:pass})})
    .then(r=>r.json()).then(d=>{
      if(d.ok){document.getElementById('login-box').style.display='none';document.getElementById('main').style.display='block';loadDashboard();}
      else alert(d.error||'口令错误');
    });
}

function loadDashboard(){
  fetch('/api/dashboard?days=14').then(r=>r.json()).then(d=>{
    if(!d.ok||!d.latest_date){
      document.getElementById('kpis').innerHTML='<div class="empty" style="grid-column:1/-1">暂无数据 · 投手上传 xlsx 后这里会显示运营数据</div>';
      return;
    }
    const s=d.summary;
    // KPI
    document.getElementById('kpis').innerHTML=`
      <div class="kpi"><div class="num">$${s.spend}</div><div class="label">今日花费</div><div class="sub">${d.latest_date}</div></div>
      <div class="kpi"><div class="num">${s.hvu}</div><div class="label">HVU</div><div class="sub">高价值用户</div></div>
      <div class="kpi"><div class="num">$${s.cphq}</div><div class="label">CPHQ</div><div class="sub">${s.cphq<2?'✓ 健康':'⚠ 偏高'}</div></div>
      <div class="kpi"><div class="num">${s.groups}</div><div class="label">活跃组</div><div class="sub">有消耗的广告组</div></div>
    `;
    // 趋势
    if(d.daily&&d.daily.length>1){
      const maxSpend=Math.max(...d.daily.map(x=>x.spend));
      document.getElementById('trend-card').innerHTML=`
        <div class="trend-row">${d.daily.map(day=>{
          const h=maxSpend>0?Math.round(day.spend/maxSpend*50):0;
          return `<div class="trend-bar" style="height:${Math.max(h,2)}px"><div class="tip">${day.date.slice(5)}</div></div>`;
        }).join('')}</div>
        <table><tr><th>日期</th><th>花费</th><th>HVU</th><th>CPHQ</th><th>组数</th></tr>
        ${d.daily.map(day=>{
          const cphq=day.hvu>0?(day.spend/day.hvu).toFixed(2):'—';
          return `<tr><td>${day.date.slice(5)}</td><td>$${day.spend.toFixed(1)}</td><td>${day.hvu}</td><td>$${cphq}</td><td>${day.groups}</td></tr>`;
        }).join('')}</table>`;
    } else {
      document.getElementById('trend-card').innerHTML='<p style="font-size:12px;color:var(--muted)">需要至少 2 天数据才能显示趋势</p>';
    }
    // 各组
    if(d.groups&&d.groups.length){
      document.getElementById('groups-card').innerHTML=`
        <table><tr><th>广告组</th><th>花费</th><th>HVU</th><th>CPHQ</th><th>评级</th></tr>
        ${d.groups.map(g=>{
          let tier='B',cls='tier-b';
          if(g.cphq>0&&g.cphq<=1.5){tier='S';cls='tier-s';}
          else if(g.cphq<=3){tier='A';cls='tier-a';}
          else if(g.hvu===0){tier='R';cls='tier-r';}
          return `<tr><td>${esc(g.name)}</td><td>$${g.spend}</td><td>${g.hvu}</td><td class="${cls}">$${g.cphq}</td><td class="${cls}">${tier}</td></tr>`;
        }).join('')}</table>`;
    }
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}

// 自动恢复
fetch('/api/results').then(r=>{if(r.ok){document.getElementById('login-box').style.display='none';document.getElementById('main').style.display='block';loadDashboard();}}).catch(()=>{});
</script>
</body>
</html>
